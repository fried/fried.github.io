<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ config.title }}{% endblock %}</title>
  <meta name="description" content="{% block description %}{{ config.description }}{% endblock %}">
  <link rel="stylesheet" href="{{ get_url(path='style.css') }}">
  <link rel="alternate" type="application/rss+xml" title="RSS" href="{{ get_url(path='rss.xml') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300..900;1,8..60,300..900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
</head>
<body>
  <header class="site-header">
    <nav>
      <a href="{{ get_url(path='/') }}" class="site-name">{{ config.title }}</a>
      <div class="nav-links">
        {% set blog = get_section(path="blog/_index.md") %}
        {% if blog.pages | length > 0 %}
        <a href="{{ get_url(path='@/blog/_index.md') }}">Blog</a>
        {% endif %}
        <a href="{{ get_url(path='@/stories/_index.md') }}">Stories</a>
        <a href="{{ get_url(path='@/resume.md') }}">Resume</a>
        <button id="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
          <span class="sun">☀️</span>
          <span class="moon">🌙</span>
        </button>
      </div>
    </nav>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <p>&copy; {{ now() | date(format="%Y") }} {{ config.title }}</p>
  </footer>

  <script>
    (function() {
      const toggle = document.getElementById('theme-toggle');
      const html = document.documentElement;
      const stored = localStorage.getItem('theme');
      if (stored) {
        html.setAttribute('data-theme', stored);
      } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        html.setAttribute('data-theme', 'dark');
      }
      toggle.addEventListener('click', function() {
        const current = html.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
      });
    })();
  </script>
</body>
</html>
